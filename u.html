<!DOCTYPE html>
<html lang="en" data-title-key="doc_title_me">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="referrer" content="no-referrer" />
  <title>My Musicals — MusicalMap</title>
  <!-- 社群分享預覽（Open Graph / Twitter）。靜態基礎版：爬蟲不執行 JS，故顯示 MusicalMap 品牌卡。
       每人專屬的預覽圖（含名字/看劇數）需要 serverless OG 渲染，留待自訂網域一起做。 -->
  <meta property="og:type" content="profile" />
  <meta property="og:site_name" content="MusicalMap" />
  <meta property="og:title" content="My Musicals — 我的音樂劇足跡" />
  <meta property="og:description" content="看看我在世界各地看過的音樂劇。用 MusicalMap 建立你自己的音樂劇護照。" />
  <meta property="og:image" content="https://dannynycc.github.io/MusicalMap/logo.png" />
  <meta name="twitter:card" content="summary" />
  <meta name="twitter:title" content="My Musicals — 我的音樂劇足跡" />
  <meta name="twitter:description" content="看看我在世界各地看過的音樂劇。用 MusicalMap 建立你自己的音樂劇護照。" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500;700;900&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  <link rel="stylesheet" href="css/style.css" />
  <link rel="stylesheet" href="css/me.css" />
</head>
<body>
  <header id="me-top">
    <div class="top-inner">
      <a id="me-brand" href="index.html">Musical<span>Map</span></a>
      <nav>
        <div id="lang-switch" role="group" aria-label="Language / 語言">
          <span class="globe" aria-hidden="true">🌐</span>
          <button type="button" class="lang-opt" data-lang="zh" lang="zh-Hant">中文</button>
          <button type="button" class="lang-opt" data-lang="en" lang="en">English</button>
        </div>
        <a href="index.html" data-i18n="nav_global_map">🗺 Global map</a>
        <a href="me.html" class="btn-primary" data-i18n="u_create">＋ Create your own</a>
      </nav>
    </div>
  </header>

  <main id="me-main">
    <section id="pub-hero" class="hero" hidden>
      <h1 id="pub-name">My Musicals</h1>
      <p id="pub-sub" class="muted"></p>
    </section>

    <section id="pub-body" hidden>
      <div class="pub-tabs">
        <button class="pub-tab active" data-tab="overview" data-i18n="u_tab_overview">📊 Overview</button>
        <button class="pub-tab" data-tab="log" data-i18n="u_tab_log">📋 Log</button>
      </div>

      <div id="tab-overview">
        <div id="map-wrap"><div id="me-map"></div></div>
        <div id="tiles"></div>
        <div id="charts">
          <div class="chart-card c-green"><h4 data-i18n="me_top_shows">Top Musicals</h4><div class="cc-body" id="c-shows"></div></div>
          <div class="chart-card c-amber"><h4 data-i18n="me_top_countries">Top Countries</h4><div class="cc-body" id="c-countries"></div></div>
          <div class="chart-card c-red"><h4 data-i18n="me_top_cities">Top Cities</h4><div class="cc-body" id="c-cities"></div></div>
          <div class="chart-card c-purple"><h4 data-i18n="me_top_theatres">Top Theatres</h4><div class="cc-body" id="c-venues"></div></div>
          <div class="chart-card c-teal"><h4 data-i18n="me_per_year">Per Year</h4><div class="cc-body"><canvas id="c-year"></canvas></div></div>
          <div class="chart-card c-blue"><h4 data-i18n="me_per_month">Per Month</h4><div class="cc-body"><canvas id="c-month"></canvas></div></div>
          <div class="chart-card c-indigo"><h4 data-i18n="me_per_weekday">Per Weekday</h4><div class="cc-body"><canvas id="c-weekday"></canvas></div></div>
        </div>
      </div>

      <div id="tab-log" hidden>
        <div class="table-wrap"><table id="log-table"></table></div>
      </div>
    </section>

    <section id="pub-empty" class="hero" hidden>
      <h1 data-i18n="u_not_found">Profile not found</h1>
      <p class="muted" data-i18n="u_not_found_sub">This profile doesn’t exist or isn’t public.</p>
      <a href="me.html" class="btn-primary big" data-i18n="u_create_big">Create your own My Musicals</a>
    </section>
  </main>

  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4"></script>
  <script src="js/config.js"></script>
  <script src="js/i18n.js"></script>
  <script src="js/u.js"></script>
</body>
</html>
