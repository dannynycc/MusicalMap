name: Update data & deploy

# Keeps the map current automatically:
#  - runs the scrapers twice daily (musical listings change slowly)
#  - rebuilds data/shows.json, commits it back if anything changed
#  - deploys the static site to GitHub Pages
on:
  schedule:
    # Twice daily, in Taipei time (UTC+8). GitHub cron is UTC.
    - cron: "0 22 * * *"       # 22:00 UTC = 06:00 Taipei (next day)
    - cron: "0 10 * * *"       # 10:00 UTC = 18:00 Taipei
  workflow_dispatch: {}         # manual "Run workflow" button
  push:
    branches: [main]

permissions:
  contents: write               # commit refreshed data back
  pages: write                  # deploy Pages
  id-token: write               # Pages OIDC

concurrency:
  group: musicalmap
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4
        with:
          fetch-depth: 0          # full history so rebase-before-push works

      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065  # v5
        with:
          python-version: "3.12"

      # Node is used by the i18n build (opencc-js) to generate the per-language
      # data variants and the prerendered /en //zh-hans //zh-hant/ pages.
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020  # v4
        with:
          node-version: "20"

      # Scrape only on schedule / manual run. On push the committed data is
      # already fresh (built locally), so we skip scraping and just deploy —
      # this avoids a push-vs-CI race on the data commit.
      # gen_catalog.py uses OpenCC to fold Traditional/Simplified Chinese into the
      # venue/title search blobs; without it those venues lose cross-script search.
      # Versions pinned to guard the supply chain: PyPI releases are immutable, so
      # `==` freezes each package to the exact artifact we've validated and blocks a
      # future malicious release from being auto-picked up. These match the latest
      # stable at time of pinning (2026-07-15) — behavior-identical to the prior
      # unpinned install. Bump deliberately when upgrading.
      - name: Install Python deps
        if: github.event_name != 'push'
        run: pip install opencc-python-reimplemented==0.1.7 curl_cffi==0.15.0 playwright==1.61.0

      # atrapalo.com sits behind Fastly's JS bot challenge; the scraper drives a
      # real Chromium (Playwright) to pass it once, then GETs the rest. Verified
      # 2026-06-26 that the Actions datacenter IP DOES get through (probe run).
      - name: Install Chromium for atrapalo (Playwright)
        if: github.event_name != 'push'
        run: python -m playwright install --with-deps chromium

      - name: Scrape sources & rebuild shows.json
        if: github.event_name != 'push'
        run: |
          # Don't fail the whole run if one source is temporarily down;
          # build_shows.py still merges whatever source files exist.
          python scrapers/_run.py scrapers/westend.py     || echo "::warning::West End scrape failed"
          python scrapers/_run.py scrapers/broadway.py    || echo "::warning::Broadway scrape failed"
          python scrapers/_run.py scrapers/broadway_tours.py || echo "::warning::tours scrape failed"
          python scrapers/_run.py scrapers/intl.py        || echo "::warning::international scrape failed"
          python scrapers/_run.py scrapers/shiki.py       || echo "::warning::shiki scrape failed"
          python scrapers/_run.py scrapers/takarazuka.py  || echo "::warning::takarazuka scrape failed"
          python scrapers/_run.py scrapers/japan.py       || echo "::warning::japan (toho+) scrape failed"
          python scrapers/_run.py scrapers/easteurope.py  || echo "::warning::easteurope (jegy.hu+) scrape failed"
          python scrapers/_run.py scrapers/italy.py       || echo "::warning::italy (teatro.it) scrape failed"
          python scrapers/_run.py scrapers/sweden.py      || echo "::warning::sweden (showtic) scrape failed"
          python scrapers/_run.py scrapers/netherlands.py || echo "::warning::netherlands (stage) scrape failed"
          python scrapers/_run.py scrapers/poland.py      || echo "::warning::poland (ebilet) scrape failed"
          python scrapers/_run.py scrapers/norway.py      || echo "::warning::norway scrape failed"
          python scrapers/_run.py scrapers/austria.py     || echo "::warning::austria (VBW) scrape failed"
          python scrapers/_run.py scrapers/middleeast.py  || echo "::warning::middleeast (platinumlist) scrape failed"
          python scrapers/_run.py scrapers/portugal.py    || echo "::warning::portugal (bol.pt) scrape failed"
          python scrapers/_run.py scrapers/china.py       || echo "::warning::china (shcstheatre) scrape failed"
          python scrapers/_run.py scrapers/china_poly.py  || echo "::warning::china_poly (polyt.cn) scrape failed"
          python scrapers/_run.py scrapers/china_ypiao.py || echo "::warning::china_ypiao (ypiao) scrape failed"
          python scrapers/_run.py scrapers/china_chinaticket.py || echo "::warning::china_chinaticket (zhongyan) scrape failed"
          python scrapers/_run.py scrapers/china_juooo.py || echo "::warning::china_juooo (juooo.com) scrape failed"
          python scrapers/_run.py scrapers/interpark.py   || echo "::warning::interpark scrape failed"
          python scrapers/_run.py scrapers/atg.py         || echo "::warning::atg scrape failed"
          python scrapers/_run.py scrapers/stage_de.py    || echo "::warning::stage scrape failed"
          python scrapers/_run.py scrapers/madrid.py      || echo "::warning::madrid scrape failed"
          python scrapers/_run.py scrapers/atrapalo.py    || echo "::warning::atrapalo (Fastly challenge) scrape failed"
          python scrapers/_run.py scrapers/opentix.py     || echo "::warning::opentix scrape failed"
          python scrapers/_run.py scrapers/utiki.py       || echo "::warning::utiki (kham+udn) scrape failed"
          # 實驗性:TicketWorld bot 牆對 headless 極嚴(本機 headless 全滅);失敗自動保留
          # 既有 philippines.json / manual.json 的馬尼拉檔期(2026-07-14)
          python scrapers/_run.py scrapers/philippines.py || echo "::warning::philippines (ticketworld) scrape failed"
          python scrapers/_run.py scrapers/tm_tours.py    || echo "::warning::tm_tours sweep failed"
          python scrapers/_run.py scrapers/ticketmaster.py || echo "::warning::ticketmaster scrape failed"
          python scrapers/_run.py scrapers/build_shows.py
          # TodayTix deep-link matcher (needs shows.json from the build above; the next
          # build_shows attaches its links). Affiliate re-point — see docs/DESIGN_affiliate.md.
          python scrapers/_run.py scrapers/todaytix.py    || echo "::warning::todaytix matcher failed"
          # open-ended long-runners: fill end_date from TM's last on-sale date, then rebuild
          python scrapers/_run.py scrapers/booking_horizon.py || echo "::warning::booking_horizon failed"
          python scrapers/_run.py scrapers/build_shows.py
          python scrapers/_run.py scrapers/audit_dups.py  || echo "::warning::dedup/junk audit flagged issues"
          python scrapers/_run.py scrapers/audit_manual.py || echo "::warning::manual.json has stale/ended shows — review data/manual.json"
          python scrapers/_run.py scrapers/gen_catalog.py
          python scrapers/_run.py scrapers/audit_productions.py || echo "::warning::production audit flagged broken posters — review works.json"
          # 哨兵體檢:常設鐵桿劇目+來源低標(2026-07-09;維也納/broadway 靜默壞抓事件後制度化)
          python scrapers/_run.py scrapers/audit_sentinels.py || echo "::warning::sentinel audit failed to run"
          # 官網體檢:地區沒對上/授權頁污染/無條目數(2026-07-09 星光快車官網漏洞後制度化)
          python scrapers/_run.py scrapers/audit_official.py || echo "::warning::official audit failed to run"
          # 地理體檢:國界框+venue_coords 修正表自體檢(2026-07-10 保利座標污染事件後入 CI)
          python scrapers/_run.py scrapers/audit_geo.py || echo "::warning::geo audit failed to run"
          # tour_name 體檢:presenter 名滲入/跨 attraction 撞名(2026-07-13 Lexington/Arena Spectacular 掛羊頭事件後入 CI)
          python scrapers/_run.py scrapers/audit_tournames.py || echo "::warning::tour_name audit flagged presenter/cross-attraction issues"
          # 標題健檢:未歸組/同劇分裂/髒指紋(2026-07-13 Love Never Dies 未歸組事件後入 CI;誤報請補 KNOWN_DISTINCT)
          python scrapers/_run.py scrapers/audit_titles.py || echo "::warning::title audit flagged ungrouped/split/dirty titles"
          # 抽樣對照源頭:每日隨機 15 卡 vs TM API(不預設病型,守「沒想到的錯」;2026-07-13)
          python scrapers/_run.py scrapers/audit_sample_truth.py || echo "::warning::sample-truth audit found cards disagreeing with Ticketmaster"
          # 海報守門:釘圖健康/新庫存圖 vs baseline/縮圖迴歸/抽樣尺寸(2026-07-13 「90 張換圖如何 gating」)
          python scrapers/_run.py scrapers/audit_posters.py || echo "::warning::poster audit flagged dead pins / new stock art / thumbnails"
          # Accumulate today's snapshot into the immutable historical archive
          # (separate stateful layer; never deletes closed runs). Pure build above
          # stays stateless. See scrapers/archive.py.
          python scrapers/_run.py scrapers/archive.py     || echo "::warning::archive accumulate failed"
        env:
          # set this repo secret to enable Ticketmaster refresh in CI; if unset
          # the scraper no-ops and the committed ticketmaster.json is kept.
          TICKETMASTER_API_KEY: ${{ secrets.TICKETMASTER_API_KEY }}

      # Regenerate the language variants + prerendered tri-URL site from the freshly
      # built shows.json (OpenCC 簡⇄繁 + place/platform localization, prerendered HTML
      # with JSON-LD so Google + JS-blind AI crawlers see content). See build/*.mjs.
      - name: Build language variants & prerendered site
        if: github.event_name != 'push'
        run: |
          npm install --no-audit --no-fund
          node build/gen_variants.mjs
          node build/gen_site.mjs
          rm -rf node_modules    # keep it out of the Pages artifact (path: .)

      - name: Commit refreshed data (if changed)
        if: github.event_name != 'push'
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          # 根目錄的 index/about/guide/privacy/terms.html = 英文版產物(v2.54.0 起 en 住根,
          # 舊的 `en` 目錄已刪 → 再列它會 fatal: pathspec 'en' did not match any files)。
          git add data/*.json data/archive/*.json data/variants/*.json \
                  logs/api_usage.json \
                  index.html about.html guide.html privacy.html terms.html \
                  sitemap.xml robots.txt zh-hans zh-hant
          if git diff --cached --quiet; then
            echo "No data changes."; exit 0
          fi
          git commit -m "chore(data): auto-refresh listings [skip ci]"
          # Rebase onto any concurrent change, retry to survive races. CRITICAL: on a
          # rebase conflict (two runs regenerating the same shows.json/variants), abort
          # so the working tree is NEVER left holding `<<<<<<<` conflict markers — those
          # would ship in the Pages artifact below (path: .) and corrupt the live JSON.
          # Aborting restores this run's own freshly-built data, which deploys cleanly.
          for i in 1 2 3; do
            if git pull --rebase --autostash origin "${GITHUB_REF_NAME}" && git push; then
              exit 0
            fi
            git rebase --abort 2>/dev/null || true
            sleep 5
          done
          echo "::warning::could not push refreshed data after retries (deploying this run's data)"

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@56afc609e74202658d3ffba0e8f6dda462b719fa  # v3
        with:
          path: .

  # 同步部署到 Cloudflare Pages(musicalmap 專案)。複用上面 build job 的同一份
  # artifact → 與 GitHub Pages 部署的內容完全一致,不會兩邊版本漂移。
  # 失敗不擋 GH Pages 部署(兩個 job 平行);token/帳號 ID 在 repo Secrets。
  deploy-cloudflare:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093  # v4
        with:
          name: github-pages
      - name: Unpack Pages artifact
        run: mkdir site && tar -xf artifact.tar -C site
      - uses: cloudflare/wrangler-action@9acf94ace14e7dc412b076f2c5c20b8ce93c79cd  # v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: pages deploy site --project-name=musicalmap --branch=main --commit-dirty=true

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      # Pages 對短時間連續部署會回「Deployment failed, try again later」(暫時性 throttle,
      # 2026-07-03 一小時內多次 push 觸發三次)。第一次失敗不讓 run 掛掉,等 2 分鐘重試一次;
      # 重試再失敗才是真錯誤。
      - id: deployment
        uses: actions/deploy-pages@d6db90164ac5ed86f2b6aed7e0febac5b3c0c03e  # v4
        continue-on-error: true
      - name: Wait before retry (Pages throttle)
        if: steps.deployment.outcome == 'failure'
        run: sleep 120
      - id: deployment-retry
        if: steps.deployment.outcome == 'failure'
        uses: actions/deploy-pages@d6db90164ac5ed86f2b6aed7e0febac5b3c0c03e  # v4
