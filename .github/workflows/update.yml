name: Update data & deploy

# Keeps the map current automatically:
#  - runs the scrapers on a daily schedule (musical listings change slowly)
#  - rebuilds data/shows.json, commits it back if anything changed
#  - deploys the static site to GitHub Pages
on:
  schedule:
    - cron: "0 9 * * *"        # 09:00 UTC daily (~17:00 Taipei)
  workflow_dispatch: {}         # manual "Run workflow" button
  push:
    branches: [main]

permissions:
  contents: write               # commit refreshed data back
  pages: write                  # deploy Pages
  id-token: write               # Pages OIDC

concurrency:
  group: musicalmap
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0          # full history so rebase-before-push works

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      # Scrape only on schedule / manual run. On push the committed data is
      # already fresh (built locally), so we skip scraping and just deploy —
      # this avoids a push-vs-CI race on the data commit.
      # gen_catalog.py uses OpenCC to fold Traditional/Simplified Chinese into the
      # venue/title search blobs; without it those venues lose cross-script search.
      - name: Install Python deps
        if: github.event_name != 'push'
        run: pip install opencc-python-reimplemented

      - name: Scrape sources & rebuild shows.json
        if: github.event_name != 'push'
        run: |
          # Don't fail the whole run if one source is temporarily down;
          # build_shows.py still merges whatever source files exist.
          python scrapers/westend.py     || echo "::warning::West End scrape failed"
          python scrapers/broadway.py    || echo "::warning::Broadway scrape failed"
          python scrapers/broadway_tours.py || echo "::warning::tours scrape failed"
          python scrapers/intl.py        || echo "::warning::international scrape failed"
          python scrapers/shiki.py       || echo "::warning::shiki scrape failed"
          python scrapers/takarazuka.py  || echo "::warning::takarazuka scrape failed"
          python scrapers/japan.py       || echo "::warning::japan (toho+) scrape failed"
          python scrapers/easteurope.py  || echo "::warning::easteurope (jegy.hu+) scrape failed"
          python scrapers/interpark.py   || echo "::warning::interpark scrape failed"
          python scrapers/atg.py         || echo "::warning::atg scrape failed"
          python scrapers/stage_de.py    || echo "::warning::stage scrape failed"
          python scrapers/madrid.py      || echo "::warning::madrid scrape failed"
          python scrapers/opentix.py     || echo "::warning::opentix scrape failed"
          python scrapers/utiki.py       || echo "::warning::utiki (kham+udn) scrape failed"
          python scrapers/tm_tours.py    || echo "::warning::tm_tours sweep failed"
          python scrapers/ticketmaster.py || echo "::warning::ticketmaster scrape failed"
          python scrapers/build_shows.py
          # open-ended long-runners: fill end_date from TM's last on-sale date, then rebuild
          python scrapers/booking_horizon.py || echo "::warning::booking_horizon failed"
          python scrapers/build_shows.py
          python scrapers/gen_catalog.py
          # Accumulate today's snapshot into the immutable historical archive
          # (separate stateful layer; never deletes closed runs). Pure build above
          # stays stateless. See scrapers/archive.py.
          python scrapers/archive.py     || echo "::warning::archive accumulate failed"
        env:
          # set this repo secret to enable Ticketmaster refresh in CI; if unset
          # the scraper no-ops and the committed ticketmaster.json is kept.
          TICKETMASTER_API_KEY: ${{ secrets.TICKETMASTER_API_KEY }}

      - name: Commit refreshed data (if changed)
        if: github.event_name != 'push'
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/*.json data/archive/*.json
          if git diff --cached --quiet; then
            echo "No data changes."; exit 0
          fi
          git commit -m "chore(data): auto-refresh listings [skip ci]"
          # Rebase onto any concurrent change, retry to survive races.
          for i in 1 2 3; do
            git pull --rebase --autostash origin "${GITHUB_REF_NAME}" \
              && git push && exit 0 || sleep 5
          done
          echo "::warning::could not push refreshed data after retries"

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: .

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
