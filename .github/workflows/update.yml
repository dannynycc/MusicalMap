name: Update data & deploy

# Keeps the map current automatically:
#  - runs the scrapers on a daily schedule (musical listings change slowly)
#  - rebuilds data/shows.json, commits it back if anything changed
#  - deploys the static site to GitHub Pages
on:
  schedule:
    - cron: "0 9 * * *"        # 09:00 UTC daily (~17:00 Taipei)
  workflow_dispatch: {}         # manual "Run workflow" button
  push:
    branches: [main]

permissions:
  contents: write               # commit refreshed data back
  pages: write                  # deploy Pages
  id-token: write               # Pages OIDC

concurrency:
  group: musicalmap
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Scrape sources & rebuild shows.json
        run: |
          # Don't fail the whole run if one source is temporarily down;
          # build_shows.py still merges whatever source files exist.
          python scrapers/westend.py    || echo "::warning::West End scrape failed"
          python scrapers/broadway.py   || echo "::warning::Broadway scrape failed"
          python scrapers/wicked_tour.py || echo "::warning::Wicked tour scrape failed"
          python scrapers/build_shows.py

      - name: Commit refreshed data (if changed)
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/*.json
          if git diff --cached --quiet; then
            echo "No data changes."
          else
            git commit -m "chore(data): auto-refresh listings [skip ci]"
            git push
          fi

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: .

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
