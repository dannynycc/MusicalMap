name: atrapalo probe (datacenter-IP test)

# One-off empirical test: does the atrapalo Fastly challenge let a GitHub-hosted
# Ubuntu runner (Azure datacenter IP) through, or does it block like the research
# warned? Run manually via the "Run workflow" button. Does NOT commit anything.
# Delete this file once the question is settled.

on:
  workflow_dispatch: {}

jobs:
  probe:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install deps + Chromium
        run: |
          pip install curl_cffi playwright
          python -m playwright install --with-deps chromium

      - name: Run atrapalo scraper on datacenter IP
        run: |
          echo "Runner public IP:"; curl -s https://api.ipify.org || true; echo
          python scrapers/atrapalo.py
          echo "--- result ---"
          python - <<'PY'
          import json, sys
          try:
              d = json.load(open("data/atrapalo.json", encoding="utf-8"))
              n = d.get("meta", {}).get("count", 0)
              print(f"PROBE RESULT: atrapalo.json count = {n}")
              # Datacenter IP verdict
              if n >= 100:
                  print("VERDICT: PASS — Actions datacenter IP got through Fastly.")
              else:
                  print(f"VERDICT: PARTIAL — only {n} shows; cookie may have expired mid-run.")
                  sys.exit(1)
          except Exception as e:
              print(f"VERDICT: FAIL — {type(e).__name__}: {e}")
              sys.exit(1)
          PY
