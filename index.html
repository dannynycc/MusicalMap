<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>MusicalMap — live world map of musicals 全球音樂劇即時地圖</title>
  <meta name="description" content="An interactive map of musicals playing around the world right now — Broadway, West End, tours and original productions. 全球正在上演的音樂劇即時地圖。" />
  <link rel="canonical" href="https://themusicalmap.com/" />
  <link rel="alternate" hreflang="en" href="https://themusicalmap.com/en/" />
  <link rel="alternate" hreflang="zh-Hans" href="https://themusicalmap.com/zh-hans/" />
  <link rel="alternate" hreflang="zh-Hant" href="https://themusicalmap.com/zh-hant/" />
  <link rel="alternate" hreflang="x-default" href="https://themusicalmap.com/" />
  <script>
    (function () {
      var v = localStorage.getItem("mm_variant");
      if (v !== "en" && v !== "zh-hans" && v !== "zh-hant") {
        var l = (navigator.language || "en").toLowerCase();
        v = l.indexOf("zh") === 0
          ? (l.indexOf("cn") > -1 || l.indexOf("hans") > -1 || l.indexOf("sg") > -1 ? "zh-hans" : "zh-hant")
          : "en";
      }
      location.replace("/" + v + "/");
    })();
  </script>
</head>
<body>
  <p>MusicalMap — choose your language / 選擇語言:
    <a href="/zh-hant/">繁體中文</a> ·
    <a href="/zh-hans/">简体中文</a> ·
    <a href="/en/">English</a>
  </p>
</body>
</html>
