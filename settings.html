<style>

.share-field{display:block;margin-bottom:16px;max-width:520px}

.handle-row .handle-prefix{padding:0 2px 0 11px;font-size:13px;color:var(--ink3,#999);font-family:var(--mono,monospace);white-space:nowrap}

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2.110.0/dist/umd/supabase.js" integrity="sha384-3wY11tldQ5+yWqAvmTN4XtQvnjoTva0cV15O/O/O5NTtp0ivVopSzLOzsVXWZse9" crossorigin="anonymous"></script>
<script src="js/config.js"></script>
<script>
/* 帳號設定頁:輕量 auth(不同步 sightings)+身分/公開/刪帳號;規則與 me.html/DESIGN_username_sharing.md 一致。
   改名唯一入口=rename_handle RPC;查重=handle_available;?signout=1=全站登出入口(主站 nav 的登出導here)。 */
(function(){
  const $=s=>document.getElementById(s);
  const T=window.MM_T||(k=>k), TN=(k,v)=>{let s=T(k);for(const n in(v||{}))s=s.replace('{'+n+'}',v[n]);return s;};
  const cfg=window.MM_CONFIG||{};
  const gate=$('stgate'), gmsg=$('gate-msg'), glogin=$('gate-login');
  const showGate=(msg,login)=>{gate.style.display='flex';gmsg.textContent=msg;glogin.hidden=!login;};
  const hideGate=()=>{gate.style.display='none';};
  if(!cfg.READY||typeof supabase==='undefined'){showGate(T('gate_no_backend'),false);return;}
  const sb=supabase.createClient(cfg.SUPABASE_URL,cfg.SUPABASE_ANON_KEY);
  showGate(T('gate_loading'),false);

  const norm=v=>String(v||'').trim().toLowerCase().replace(/[^a-z0-9_-]/g,'').slice(0,30);
  // 與 DB handle_reserved()（supabase/add_handle_aliases.sql）同步，兩邊都要改
  const RESERVED=new Set(['u','me','index','admin','api','app','www','my','null','undefined','theatres','privacy','terms','login','logout','signup','settings','account','stats','static','assets','js','css','data','posters','logos','en','zh-hant','zh-hans','help','about','official','map','share','guide','me-input']);
  const shareUrl=h=>'https://my.themusicalmap.com/'+encodeURIComponent(h);
  function ownerCookie(h){try{
    if(!/(^|\.)themusicalmap\.com$/.test(location.hostname))return;
    document.cookie=h?('mm_owner='+encodeURIComponent(h)+'; Domain=.themusicalmap.com; Path=/; Max-Age=31536000; Secure; SameSite=Lax')
                     :'mm_owner=; Domain=.themusicalmap.com; Path=/; Max-Age=0; Secure; SameSite=Lax';
    if(!h)avCookie('');   // 登出連頭像 cookie 一起清
  }catch(e){}}
  function clearLocalAll(){try{localStorage.removeItem('mm-log');}catch(e){}try{sessionStorage.removeItem('mev2_synced');Object.keys(sessionStorage).filter(k=>k.indexOf('mev2_reloaded_')===0).forEach(k=>sessionStorage.removeItem(k));}catch(e){}}

  // ?signout=1:全站登出入口(session 住本 origin;主站/各頁 nav 的「登出」導這裡)
  const SIGNOUT=new URLSearchParams(location.search).get('signout')==='1';

  let UID=null, CUR={handle:'',is_public:false,show_price:false,show_seat:false}, DISPLAY='', EMAIL='', CREATED='', AVATAR='';
  function avCookie(url){try{
    if(!/(^|\.)themusicalmap\.com$/.test(location.hostname))return;
    if(url)document.cookie='mm_av='+encodeURIComponent(url)+'; Domain=.themusicalmap.com; Path=/; Max-Age=31536000; Secure; SameSite=Lax';
    else document.cookie='mm_av=; Domain=.themusicalmap.com; Path=/; Max-Age=0; Secure; SameSite=Lax';
  }catch(e){}}
  const EN_MONTHS=['January','February','March','April','May','June','July','August','September','October','November','December'];

  async function isAvailable(h){
    if(h===CUR.handle&&h)return true;
    if(RESERVED.has(h))return false;
    try{const {data,error}=await sb.rpc('handle_available',{p_handle:h});if(error)return null;return !!data;}catch(e){return null;}
  }
  const st={ok:false,seq:0,timer:null};
  const setSt=(cls,msg)=>{const el=$('stStatus');el.className='handle-status '+cls;el.textContent=msg;};
  async function check(){
    const h=norm($('stHandle').value);
    st.ok=false;
    if(!h){setSt('muted',T('h_input_hint'));return;}
    if(!/[a-z0-9]/.test(h)){setSt('muted',T('h_input_hint'));return;}
    if(RESERVED.has(h)){setSt('bad',T('h_reserved'));return;}
    if(h===CUR.handle){st.ok=true;setSt('ok',T('h_current'));return;}
    setSt('muted',T('h_checking'));
    const seq=++st.seq, ok=await isAvailable(h);
    if(seq!==st.seq)return;
    if(ok===true){st.ok=true;setSt('ok',TN('h_avail',{h}));}
    else if(ok===false){st.ok=false;setSt('bad',TN('h_taken',{h}));}
    else{st.ok=true;setSt('muted',T('h_will_check'));}
  }
  $('stHandle').addEventListener('input',()=>{
    const el=$('stHandle'),raw=el.value,n=norm(raw);
    if(raw!==n){const caret=Math.max(0,(el.selectionStart||raw.length)-(raw.length-n.length));el.value=n;try{el.setSelectionRange(caret,caret);}catch(e){}}
    clearTimeout(st.timer);st.timer=setTimeout(check,320);
  });

  async function setHandle(h){
    try{
      const {data,error}=await sb.rpc('rename_handle',{p_new:h});
      if(error){
        if(/function|schema cache|not find|404/i.test(error.message||'')){
          const r=await sb.from('profiles').upsert({id:UID,handle:h});
          if(r.error)return /duplicate|unique/i.test(r.error.message||'')?'taken':'error:'+r.error.message;
          return 'ok';
        }
        return 'error:'+error.message;
      }
      return data||'error:empty';
    }catch(e){return 'error:'+((e&&e.message)||e);}
  }
  function explain(code){
    if(code==='taken')setSt('bad',T('h_taken_short'));
    else if(code==='reserved')setSt('bad',T('h_reserved'));
    else if(code==='bad_format')setSt('bad',T('h_bad_format'));
    else setSt('bad',T('h_save_fail')+code);
  }

  function renderId(){
    const name=DISPLAY||CUR.handle||'—';
    $('stName').textContent=name;
    $('stMono').textContent=(String(name).trim().charAt(0)||'?');
    if(AVATAR){const im=new Image();im.alt='';im.referrerPolicy='no-referrer';
      im.onload=()=>{$('stMono').textContent='';$('stMono').appendChild(im);};im.src=AVATAR;}
    $('stEmail').textContent=EMAIL||'—';
    let j='';
    if(CREATED){const d=new Date(CREATED);if(!isNaN(d)){const y=d.getFullYear(),m=d.getMonth()+1;
      j=' · '+((window.MM_HL==='en')?TN('pc_joined',{m:EN_MONTHS[m-1],y}):TN('pc_joined',{y,m}));}}
    $('stJoined').textContent=j;
  }
  function renderLink(){
    const box=$('shareLink');
    if($('pubPublic').checked&&CUR.handle){box.hidden=false;const a=$('shareUrl');a.textContent=shareUrl(CUR.handle);a.href=shareUrl(CUR.handle);}
    else box.hidden=true;
  }
  const syncFields=()=>{$('shareFieldsGroup').hidden=!$('pubPublic').checked;};

  // 身分區儲存(顯示名稱+改名;改名走 RPC)
  $('stSave').addEventListener('click',async()=>{
    const h=norm($('stHandle').value), d=$('stDisplay').value.trim(), btn=$('stSave');
    if(!h){setSt('bad',T('acct_url_empty'));$('stHandle').focus();return;}
    if(!/[a-z0-9]/.test(h)){setSt('bad',T('h_input_hint'));$('stHandle').focus();return;}
    if(RESERVED.has(h)){setSt('bad',T('h_reserved'));return;}
    const renamed=h!==CUR.handle;
    btn.disabled=true;btn.textContent=T('saving');
    try{
      if(renamed){
        const r=await setHandle(h);
        if(r!=='ok'){explain(r);return;}
        CUR.handle=h;ownerCookie(h);
      }
      if(d!==DISPLAY){
        const {error}=await sb.from('profiles').upsert({id:UID,display_name:d||null});
        if(error){setSt('bad',T('display_save_fail')+(error.message||error));return;}
        DISPLAY=d;
      }
      setSt('ok',renamed?T('saved_redirect'):T('saved_ok'));
      renderId();renderLink();mountMenu();
    }finally{btn.disabled=false;btn.textContent=T('save');}
  });

  // 公開分享:開關即時生效(FR24 式);失敗回滾
  async function saveToggles(){
    const pub=$('pubPublic').checked, sp=$('showPrice').checked, ss=$('showSeat').checked;
    const el=$('stShareStatus');
    el.className='handle-status muted';el.textContent=T('saving');
    const {error}=await sb.from('profiles').upsert({id:UID,is_public:pub,show_price:sp,show_seat:ss});
    if(error){
      $('pubPublic').checked=CUR.is_public;$('showPrice').checked=CUR.show_price;$('showSeat').checked=CUR.show_seat;
      syncFields();renderLink();
      el.className='handle-status bad';el.textContent=T('h_save_fail')+(error.message||error);return;
    }
    CUR.is_public=pub;CUR.show_price=sp;CUR.show_seat=ss;
    el.className='handle-status ok';el.textContent=T('st_saved_auto');
    setTimeout(()=>{if(el.textContent===T('st_saved_auto'))el.textContent='';},1800);
  }
  $('pubPublic').addEventListener('change',()=>{syncFields();renderLink();saveToggles();});
  $('showPrice').addEventListener('change',saveToggles);
  $('showSeat').addEventListener('change',saveToggles);
  $('shareCopy').addEventListener('click',async()=>{
    const url=$('shareUrl').textContent;
    try{await navigator.clipboard.writeText(url);$('shareCopy').textContent=T('copied');setTimeout(()=>$('shareCopy').textContent=T('copy'),1600);}catch(e){}
  });

  // 登出(頁面本體按鈕;與 nav 選單同一流程)
  $('stSignout').addEventListener('click',async()=>{
    const b=$('stSignout');b.disabled=true;b.textContent=T('st_signing_out');
    ownerCookie('');try{await sb.auth.signOut();}catch(e){}clearLocalAll();
    location.href='https://themusicalmap.com/';
  });

  // 刪除帳號(輸入 username 二次確認;RPC delete_my_account)
  $('stDelete').addEventListener('click',async()=>{
    const h=(CUR.handle||'').trim();
    const typed=prompt(h?TN('del_confirm_prompt',{handle:h}):T('del_confirm_plain'));
    if(typed==null)return;
    if(h&&typed.trim().toLowerCase()!==h.toLowerCase()){alert(T('del_confirm_mismatch'));return;}
    const btn=$('stDelete');btn.disabled=true;btn.textContent=T('del_deleting');
    try{
      const {error}=await sb.rpc('delete_my_account');
      if(error)throw error;
      ownerCookie('');
      try{await sb.auth.signOut();}catch(e){}
      clearLocalAll();
      alert(T('del_done'));
      location.href='https://themusicalmap.com/';
    }catch(e){console.error('delete account',e);btn.disabled=false;btn.textContent=T('del_account');alert(T('del_fail')+'\n'+((e&&e.message)||e));}
  });

  // nav 頭像選單
  function mountMenu(){
    const slot=$('navAcct');if(!slot||!window.MMAcctMenu)return;
    slot.innerHTML='';
    const hl='?hl='+(window.MM_HL||'zh-hant');
    slot.appendChild(MMAcctMenu.build({
      letter:(DISPLAY||CUR.handle||EMAIL||'?').charAt(0),
      avatar:AVATAR,
      links:{my:CUR.handle?shareUrl(CUR.handle)+hl:('https://my.themusicalmap.com/'+hl),settings:'#'},
      onLogout:async()=>{ownerCookie('');try{await sb.auth.signOut();}catch(e){}clearLocalAll();location.href='https://themusicalmap.com/';}
    }));
  }

  async function load(uid){
    UID=uid;
    try{const {data:{user}}=await sb.auth.getUser();EMAIL=(user&&user.email)||'';
      AVATAR=(user&&user.user_metadata&&(user.user_metadata.avatar_url||user.user_metadata.picture))||'';
      if(AVATAR)avCookie(AVATAR);
    }catch(e){}
    try{
      const {data}=await sb.from('profiles').select('handle,is_public,show_price,show_seat,display_name,created_at').eq('id',uid).maybeSingle();
      CUR={handle:data?.handle||'',is_public:!!data?.is_public,show_price:!!data?.show_price,show_seat:!!data?.show_seat};
      DISPLAY=data?.display_name||'';CREATED=data?.created_at||'';
      if(CUR.handle)ownerCookie(CUR.handle);
    }catch(e){console.warn('load profile',e);}
    $('stDisplay').value=DISPLAY;
    $('stHandle').value=CUR.handle;
    setSt(CUR.handle?'ok':'muted',CUR.handle?T('h_current'):T('h_input_hint'));
    $('pubPublic').checked=CUR.is_public;$('showPrice').checked=CUR.show_price;$('showSeat').checked=CUR.show_seat;
    syncFields();renderLink();renderId();mountMenu();
    hideGate();
  }

  async function doSignout(){
    showGate(T('st_signing_out'),false);
    ownerCookie('');
    try{await sb.auth.signOut();}catch(e){}
    clearLocalAll();
    location.replace('https://themusicalmap.com/');
  }

  glogin.onclick=()=>sb.auth.signInWithOAuth({provider:'google',options:{redirectTo:location.origin+location.pathname}});
  sb.auth.onAuthStateChange((event,session)=>{
    if(SIGNOUT)return;
    if(event==='SIGNED_OUT'){showGate(T('gate_signin'),true);return;}
    if(session&&session.user)load(session.user.id);
  });
  sb.auth.getSession().then(({data})=>{
    const s=data.session;
    if(SIGNOUT){doSignout();return;}   // 有無 session 都走:清 cookie/快取→回主站
    if(s&&s.user)load(s.user.id);else showGate(T('gate_signin'),true);
  }).catch(e=>{console.warn('getSession',e);if(SIGNOUT){doSignout();return;}showGate(T('gate_signin'),true);});
})();
</script>
</body>
</html>
