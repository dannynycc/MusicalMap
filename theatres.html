<!DOCTYPE html>
<html lang="zh-Hant" data-title-key="doc_title_theatres">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>所有劇院 — MusicalMap · All Theatres</title>
  <meta name="description" content="Searchable directory of ~5,000 musical-theatre venues worldwide, on an interactive map. 全球約 5,000 個音樂劇場館的可搜尋地圖。" />
  <link rel="canonical" href="https://dannynycc.github.io/MusicalMap/theatres.html" />
  <link rel="alternate" hreflang="en" href="https://dannynycc.github.io/MusicalMap/theatres.html?lang=en" />
  <link rel="alternate" hreflang="zh-Hant" href="https://dannynycc.github.io/MusicalMap/theatres.html?lang=zh" />
  <link rel="alternate" hreflang="x-default" href="https://dannynycc.github.io/MusicalMap/theatres.html" />
  <link rel="icon" href="logo.png" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,900&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  <link rel="stylesheet" href="https://unpkg.com/leaflet.markercluster@1.5.3/dist/MarkerCluster.css" />
  <link rel="stylesheet" href="https://unpkg.com/leaflet.markercluster@1.5.3/dist/MarkerCluster.Default.css" />
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>
  <header id="topbar">
    <a id="brand" href="index.html">
      <img class="brand-logo" src="logo.png" alt="" />
      <span class="logo">Musical<span class="logo-em">Map</span></span>
      <span class="tagline" data-i18n="tagline_theatres">全球音樂劇場館地圖</span>
    </a>
    <nav id="topnav">
      <div id="lang-switch" role="group" aria-label="Language / 語言">
        <span class="globe" aria-hidden="true">🌐</span>
        <button type="button" class="lang-opt" data-lang="zh" lang="zh-Hant">中文</button>
        <button type="button" class="lang-opt" data-lang="en" lang="en">English</button>
      </div>
      <a class="nav-link" href="index.html" data-i18n="nav_map">地圖首頁</a>
      <a class="nav-link" href="guide.html" data-i18n="nav_guide">使用說明</a>
      <a id="mine-link" class="nav-cta" href="me.html" data-i18n="nav_mine">我的音樂劇</a>
    </nav>
  </header>

  <main id="map">
    <div id="venue-panel">
      <input id="vsearch" type="search" placeholder="搜尋劇院、城市…(中/英/原文皆可)" data-i18n-ph="search_ph_theatres" autocomplete="off" />
      <div id="vcount"></div>
      <ul id="vresults" hidden></ul>
    </div>
  </main>

  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <script src="https://unpkg.com/leaflet.markercluster@1.5.3/dist/leaflet.markercluster.js"></script>
  <script src="js/i18n.js"></script>
  <script src="js/theatres.js"></script>
</body>
</html>
